<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climbo Knowledge Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#21262d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#484f58;
  --purple:#A78BFA;--blue:#60A5FA;--green:#34D399;--red:#F87171;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg);gap:12px;flex-shrink:0;z-index:100}
.logo{font-size:14px;font-weight:700;white-space:nowrap;letter-spacing:.01em}
.logo span{color:var(--purple)}
.logo small{font-size:11px;font-weight:400;color:var(--muted);margin-left:8px}
.search-wrap{flex:1;max-width:280px;margin:0 auto}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--purple)}
.search-wrap input::placeholder{color:var(--muted)}
.tours{display:flex;gap:6px}
.tour-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tour-btn:hover{border-color:var(--muted);color:var(--text)}
.tour-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;position:relative}

/* BACKDROP */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:490;opacity:0;transition:opacity .25s;pointer-events:none}
.backdrop.visible{opacity:1;pointer-events:auto}

/* CANVAS */
.canvas{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;padding:24px 28px 80px}
.canvas-inner{position:relative;min-height:100%}
.svg-overlay{position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible}

/* ROWS */
.row{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.row-meta{display:flex;flex-direction:column;gap:2px;width:160px;flex-shrink:0;padding-top:5px}
.row-label-wrap{display:flex;align-items:center;gap:6px}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.row-desc{font-size:10px;color:var(--muted);margin-left:13px}
.row-nodes{flex:1;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start}

/* PILLS */
.pill{position:relative;display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .2s,border-color .2s,box-shadow .2s,background .2s;user-select:none;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.pill:hover{border-color:var(--muted)}
.pill.active{border-color:var(--row-color);box-shadow:0 0 0 1px var(--row-color),0 0 10px color-mix(in srgb,var(--row-color) 30%,transparent);background:color-mix(in srgb,var(--row-color) 8%,var(--surface))}
.pill.dimmed{opacity:.1;pointer-events:none}
.pill.highlighted{opacity:1;border-color:var(--row-color)}
.pill .badge{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;color:#000;font-size:8px;font-weight:900;flex-shrink:0}

/* PANEL */
.panel{width:400px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.panel.open{transform:translateX(0)}

/* PANEL HANDLE (mobile only) */
.panel-handle{display:none;height:28px;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.panel-handle::after{content:'';width:36px;height:4px;background:var(--muted2);border-radius:2px}
.panel-close{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.panel-close:hover{color:var(--text);border-color:var(--muted)}

.panel-inner{flex:1;overflow-y:auto;padding:22px}
.panel-inner::-webkit-scrollbar{width:4px}
.panel-inner::-webkit-scrollbar-track{background:transparent}
.panel-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.p-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:12px}
.p-badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p-title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:10px}
.p-summary{font-size:13px;font-weight:600;color:#8b949e;margin-bottom:10px;line-height:1.5;font-style:italic}
.p-desc{font-size:13px;color:#8b949e;line-height:1.65;margin-bottom:14px}
.p-bullets{margin-bottom:16px;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:5px}
.p-bullets li{font-size:12px;color:#8b949e;line-height:1.5;padding-left:14px;position:relative}
.p-bullets li::before{content:'→';position:absolute;left:0;color:var(--muted2)}
.p-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:4px 10px;text-decoration:none;transition:all .15s;margin-bottom:18px}
.p-link:hover{border-color:var(--muted);color:var(--text)}
.p-divider{border:none;border-top:1px solid var(--border);margin-bottom:16px}
.p-conn-title{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.p-group{margin-bottom:12px}
.p-group-label{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.p-group-label .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.ilink{color:var(--blue);cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;font-weight:500}
.ilink:hover{color:var(--text)}
.chip{padding:5px 11px;border-radius:10px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--text);cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--muted)}

/* STATS */
.stats{position:fixed;bottom:12px;left:20px;font-size:10px;color:var(--muted2);z-index:200;pointer-events:none;letter-spacing:.02em}

/* SCROLLBAR */
.canvas::-webkit-scrollbar{width:5px}
.canvas::-webkit-scrollbar-track{background:transparent}
.canvas::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===================== MOBILE ===================== */
@media (max-width: 767px) {
  body{height:100dvh}

  /* Header */
  header{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .logo{flex:0 0 100%;font-size:14px}
  .logo small{display:none}
  .search-wrap{flex:1;max-width:none;min-width:100px;margin:0}
  .tours{flex:0 0 auto;max-width:calc(100% - 130px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tours::-webkit-scrollbar{display:none}

  /* Pills */
  .pill{font-size:13px;padding:8px 14px}

  /* Row layout */
  .row{flex-direction:column;gap:8px}
  .row-meta{width:100%;flex-direction:row;align-items:center;padding-top:0}

  /* Canvas */
  .canvas{padding:16px 14px 140px}

  /* Backdrop */
  .backdrop{display:block}

  /* Panel — bottom sheet */
  .panel{
    position:fixed;
    bottom:0;left:0;right:0;
    width:100%;
    height:70vh;max-height:80vh;
    border-left:none;
    border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
    z-index:500;
    box-shadow:0 -8px 40px rgba(0,0,0,.5);
  }
  .panel.open{transform:translateY(0)}

  /* Panel handle & close */
  .panel-handle{display:flex}
  .panel-close{display:flex}

  /* Stats bar */
  .stats{display:none}
}
</style>
</head>

t.", "bullets": ["Brand Name — your agency name (what clients see everywhere)", "Custom Domain — a subdomain like  (point it to Climbo's DNS)", "Logo — your agency logo, shown on the login page and inside the platform", "Colors and Font — match your existing brand", "AI Brand Name — the name your AI assistant shows to clients (e.g., \"Aria\" or \"MaxAI\")"], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/getting-started/account-setup.md", "connected": ["features/stripe-billing", "features/white-label", "getting-started/what-is-climbo", "operations/smtp-setup", "getting-started/pricing-and-plans", "features/balance-explained", "getting-started/first-client-checklist"]}, {"id": "overview", "label": "Climbo Overview", "row": "foundations", "summary": "Climbo is the white-label AI platform you use to run a reputation management agency — your clients see your brand, you keep the margin.", "description": "Climbo is a SaaS platform built for agency owners, not for local businesses directly. You pay €99/month flat. You rebrand the entire platform with your name, logo, and domain. You resell it to local businesses (restaurants, dentists, gyms, law firms, contractors) at whatever price you choose — typically $99–$500/month per client. Every client you add increases your profit; your cost stays fixed at €99. The core promise to your clients: more Google reviews, higher ranking, more customers — all au", "bullets": ["SEO Agent — automatically replies to Google reviews using the client's business name, city, and service keywords", "Social Agent — turns the best reviews into image + caption posts on Google Business Profile (GBP), Facebook, and Instagr", "GEO Agent — builds and updates a website/blog so the client gets cited by AI search engines like ChatGPT and Perplexity "], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/overview.md", "connected": ["ai-agents/overview", "features/white-label", "getting-started/what-is-climbo", "ama/README", "sales/finding-clients"]}, {"id": "getting-started/pricing-and-plans", "label": "Pricing and Plans", "row": "foundations", "summary": "You pay €99/month to Climbo; you charge clients whatever you want — typical range is $99–$500/month.", "description": "Climbo's pricing to you is simple: €99/month flat. Unlimited clients. All features. No per-seat fees, no percentage of revenue. Your pricing to clients is entirely up to you. You set the plans, the names, the prices, and what features each plan includes. Climbo's Plans section is where you create these.", "bullets": ["€99/month agency fee (billed to your card)", "Plus Balance top-ups for SMS/WhatsApp/AI token usage (see features/balance-explained)", "No setup fees. No per-client fees."], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/getting-started/pricing-and-plans.md", "connected": ["getting-started/account-setup", "features/balance-explained", "features/stripe-billing"]}, {"id": "getting-started/what-is-climbo", "label": "What Is Climbo?", "row": "foundations", "summary": "Climbo is a white-label AI reputation management platform you resell to local businesses under your own brand.", "description": "Reputation management is not just getting Google reviews. Here is what it actually covers: 1. Collect reviews — get more positive reviews flowing consistently 2. Protect the rating — give unhappy customers a private feedback channel so they can be heard before posting publicly 3. Reply to every review — with AI-generated, keyword-rich responses 4. Market with reviews — share five-star reviews on social media and your website 5. Keep listings accurate — correct hours, photos, contact info on Goog", "bullets": ["Start by targeting businesses with low review counts, stale ratings, and active competitors beating them on Google — the", "The free trial strategy (\"let me get you 5 reviews for free, no credit card\") consistently converts — once a business ow", "Clients stay because the system keeps working. Churn comes from bad onboarding, not from the product failing."], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/getting-started/what-is-climbo.md", "connected": ["overview", "getting-started/first-client-checklist", "getting-started/account-setup", "sales/finding-clients"]}, {"id": "features/balance-explained", "label": "Balance Explained", "row": "platform", "summary": "Balance is your pre-paid credit pool that covers the cost of SMS messages, WhatsApp messages, and AI tokens used across all your clients.", "description": "Your Climbo Balance is separate from your €99/month subscription. It is a pre-paid credit system — similar to a phone top-up. You add money to your balance, and Climbo deducts from it as you use SMS, WhatsApp, and AI agents. Email is free and does not touch your balance.", "bullets": ["A client getting 50 review requests per month via SMS = approximately $2.50–5.00/month in balance", "A client with 30 incoming reviews/month (SEO Agent replies each) = roughly $0.10–0.20 in AI tokens", "AI token costs are minimal for most use cases"], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/features/balance-explained.md", "connected": ["features/stripe-billing", "ai-agents/overview", "features/review-requests", "getting-started/account-setup", "getting-started/pricing-and-plans"]}, {"id": "features/client-portal", "label": "Client Portal", "row": "platform", "summary": "The client portal is what your clients log into — a fully branded dashboard showing their review stats, rankings, agent activity, and GBP performance.", "description": "When your client logs into (your branded domain), they land on the client portal. This is their view — not your agency view. The portal shows your client: - How many reviews they have and how the count is growing - Their Google rating trend - What the AI agents have been doing - How their GBP is performing (impressions, clicks, calls) - Where they rank versus competitors Clients do not see billing settings, other clients' data, or any reference to Climbo.", "bullets": ["Live log of what each agent has done", "\"SEO Agent replied to 3 reviews today\"", "\"Social Agent published 2 posts to GBP and Instagram\"", "\"GEO Agent updated the website with 1 new article\""], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/features/client-portal.md", "connected": ["operations/retention", "ai-agents/overview", "features/white-label", "features/google-sheets", "features/mobile-app", "features/gbp-integration", "ai-agents/social-agent"]}, {"id": "features/gbp-integration", "label": "GBP Integration", "row": "platform", "summary": "Connecting Google Business Profile (GBP) is the foundation of everything — reviews, replies, social posts, ranking, and the GEO Agent all depend on it.", "description": "GBP (Google Business Profile) is the free Google listing that appears when someone searches for a local business. It shows the name, address, hours, photos, reviews, and contact info. It is the most important digital asset a local business has. Climbo connects directly to GBP via the Google API. Once connected: - New reviews appear in Climbo automatically - The SEO Agent can publish replies directly to Google - The Social Agent can create GBP posts - Business info edited in Climbo syncs to Googl", "bullets": ["Go to Google Business Profile manager → add a new Manager using your Google account", "Once accepted, you can connect the GBP from your Climbo without needing the client's login credentials", "This also protects you: if the client churns, remove your access. If you own the Manager role, you maintain control."], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/features/gbp-integration.md", "connected": ["ai-agents/geo-agent", "ai-agents/overview", "features/review-requests", "operations/onboarding-clients", "ai-agents/seo-agent", "getting-started/first-client-checklist", "features/client-portal", "ai-agents/social-agent"]}, {"id": "ai-agents/geo-agent", "label": "GEO Agent", "row": "platform", "summary": "The GEO Agent builds and updates a structured website for your client so they appear when someone asks ChatGPT, Perplexity, or Google AI \"best [service] in [city].\"", "description": "GEO stands for Generative Engine Optimization — the practice of making a business visible in AI search answers, not just traditional Google results. When someone types \"best Italian restaurant in Austin\" into ChatGPT, the AI doesn't check Google's search index. It draws from structured content it can understand: websites with clear schema markup, accurate business data, and consistent information. The GEO Agent makes your clients' websites exactly that. Released: April 17, 2026. This is Climbo's", "bullets": [], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/ai-agents/geo-agent.md", "connected": ["ai-agents/overview", "case-studies/community-wins", "ama/README", "features/gbp-integration", "compliance/google-review-policy-2026", "sales/demo-script"]}, {"id": "features/google-sheets", "label": "Google Sheets Integration", "row": "platform", "summary": "Connect a Google Sheet to Climbo so new rows automatically add contacts and trigger review requests — no CRM required.", "description": "Google Sheets integration lets you use a simple spreadsheet as a CRM that feeds Climbo automatically. When a business owner adds a customer to their Google Sheet (name, phone, service date), Climbo picks it up via Zapier and automatically sends that customer a review request at the right time. Released: May 2026. 24 comments in the Skool community on release.", "bullets": [], "github_url": "https://github.com/soliwkr/climbo-audit/blob/master/wiki/features/google-sheets.md", "connected": ["features/client-portal", "features/review-requests", "operations/retention", "operations/onboarding-clients"]}, {"id": "features/mobile-app", "label": "Mobile App", "row": const NM = {};
NODES.forEach(n => NM[n.id] = n);

let active = null, tour = null, q = '';

const canvas = document.getElementById('canvas');
const ci = document.getElementById('ci');
const svg = document.getElementById('svg');
const panel = document.getElementById('panel');
const pi = document.getElementById('pi');
const search = document.getElementById('search');
const backdrop = document.getElementById('backdrop');

function pill(id){ return document.getElementById('p-'+id.replace(/\//g,'-')) }

function center(el){
  const cr = ci.getBoundingClientRect(), er = el.getBoundingClientRect();
  return {x: er.left-cr.left+er.width/2, y: er.top-cr.top+er.height/2};
}

function buildRows(){
  ROWS.forEach(rk=>{
    const rc = RC[rk];
    const ns = NODES.filter(n=>n.row===rk);
    const row = document.createElement('div');
    row.className='row';
    row.innerHTML=`
      <div class="row-meta">
        <div class="row-label-wrap">
          <div class="row-dot" style="background:${rc.color}"></div>
          <span class="row-label" style="color:${rc.color}">${rc.label}</span>
        </div>
        <span class="row-desc">${rc.desc}</span>
      </div>
      <div class="row-nodes" id="rn-${rk}"></div>`;
    ci.appendChild(row);
    const cont = row.querySelector('.row-nodes');
    ns.forEach(n=>{
      const p = document.createElement('div');
      p.className='pill'; p.id='p-'+n.id.replace(/\//g,'-');
      p.dataset.id=n.id; p.dataset.row=n.row;
      p.style.setProperty('--row-color', rc.color);
      p.textContent=n.label;
      p.addEventListener('click',e=>{e.stopPropagation();select(n.id)});
      cont.appendChild(p);
    });
  });
}

function lines(id){
  svg.innerHTML='';
  svg.style.height=ci.scrollHeight+'px';
  const n=NM[id]; if(!n) return;
  const rc=RC[n.row];
  const se=pill(id); if(!se) return;
  const s=center(se);
  n.connected.forEach(cid=>{
    const te=pill(cid); if(!te) return;
    const t=center(te);
    const mx=(s.x+t.x)/2, my=(s.y+t.y)/2 - Math.abs(t.x-s.x)*0.18;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${s.x} ${s.y} Q${mx} ${my} ${t.x} ${t.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',rc.color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-opacity','0.55');
    svg.appendChild(path);
  });
}

function states(){
  const conn = active ? new Set(NM[active]?.connected||[]) : new Set();
  const tset = tour ? new Set(TOURS[tour]) : null;
  const tord = tour ? TOURS[tour] : null;
  NODES.forEach(n=>{
    const el=pill(n.id); if(!el) return;
    el.classList.remove('active','dimmed','highlighted');
    const existing=el.querySelector('.badge');
    if(existing) existing.remove();
    el.textContent=n.label;
    const match=!q||n.label.toLowerCase().includes(q)||n.summary.toLowerCase().includes(q);
    if(q){ if(!match) el.classList.add('dimmed'); return; }
    if(tset){
      if(!tset.has(n.id)){ el.classList.add('dimmed'); }
      else{
        const idx=tord.indexOf(n.id)+1;
        const b=document.createElement('span');
        b.className='badge'; b.style.background=RC[n.row].color; b.textContent=idx;
        el.prepend(b);
      }
      return;
    }
    if(active){
      if(n.id===active) el.classList.add('active');
      else if(conn.has(n.id)) el.classList.add('highlighted');
      else el.classList.add('dimmed');
    }
  });
}

function cleanMd(s){
  if(!s) return '';
  // strip frontmatter blocks ---...---
  s=s.replace(/---[\s\S]*?---\s*/g,'');
  // strip blockquote one-liners: > **Label:** text
  s=s.replace(/^>\s*\*{0,2}[^*\n]*\*{0,2}:?\s*/gm,'');
  // strip markdown headers (## Title)
  s=s.replace(/^#{1,6}\s+/gm,'');
  // strip bold/italic markers
  s=s.replace(/\*{1,3}([^*\n]+)\*{1,3}/g,'$1');
  // strip [[wiki-links]]
  s=s.replace(/\[\[([^\]]+)\]\]/g,(_,id)=>NM[id]?NM[id].label:id.split('/').pop());
  // collapse excess whitespace
  return s.replace(/\n{3,}/g,'\n\n').trim();
}

function renderBullet(b){
  // convert [[id]] to clickable inline links
  return b.replace(/\[\[([^\]]+)\]\]/g,(_,id)=>{
    const label=NM[id]?NM[id].label:id.split('/').pop();
    return `<span class="ilink" data-id="${id}">${label}</span>`;
  });
}

function showPanel(id){
  const n=NM[id]; if(!n) return;
  const rc=RC[n.row];
  const groups={};
  ROWS.forEach(r=>groups[r]=[]);
  n.connected.forEach(cid=>{ const cn=NM[cid]; if(cn) groups[cn.row].push(cn); });
  let chips='';
  ROWS.forEach(rk=>{
    if(!groups[rk].length) return;
    const crc=RC[rk];
    chips+=`<div class="p-group">
      <div class="p-group-label"><span class="dot" style="background:${crc.color}"></span><span style="color:${crc.color}">${crc.label}</span></div>
      <div class="chips">${groups[rk].map(cn=>`<span class="chip" data-id="${cn.id}">${cn.label}</span>`).join('')}</div>
    </div>`;
  });
  const bullets = n.bullets && n.bullets.length
    ? '<ul class="p-bullets">'+n.bullets.map(b=>`<li>${renderBullet(b)}</li>`).join('')+'</ul>'
    : '';
  pi.innerHTML=`
    <div class="p-badge" style="background:color-mix(in srgb,${rc.color} 12%,transparent);color:${rc.color}">
      <span class="p-badge-dot" style="background:${rc.color}"></span>${rc.label}
    </div>
    <div class="p-title">${n.label}</div>
    <div class="p-summary">${cleanMd(n.summary)}</div>
    <div class="p-desc">${cleanMd(n.description)}</div>
    ${bullets}
    <a class="p-link" href="${n.github_url}" target="_blank">↗ Full article on GitHub</a>
    <hr class="p-divider">
    <div class="p-conn-title">Connected to</div>
    ${chips}`;
  pi.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>select(c.dataset.id)));
  pi.querySelectorAll('.ilink').forEach(c=>c.addEventListener('click',()=>select(c.dataset.id)));
  panel.classList.add('open');
}

function select(id){
  if(tour){ tour=null; document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active')); }
  active=id; states(); lines(id); showPanel(id);
  // Su mobile, scrolla la pill nel viewport
  if(window.innerWidth < 768){
    const el = pill(id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }
  // Mostra backdrop su mobile
  backdrop.classList.add('visible');
}

function reset(){
  active=null; tour=null; q=''; search.value='';
  document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
  states(); svg.innerHTML=''; panel.classList.remove('open');
  backdrop.classList.remove('visible');
}

document.getElementById('panel-close').addEventListener('click', reset);
backdrop.addEventListener('click', reset);

canvas.addEventListener('click',e=>{
  if(e.target===canvas||e.target===ci||e.target===svg) reset();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') reset(); });
search.addEventListener('input',()=>{
  q=search.value.trim().toLowerCase();
  active=null; tour=null;
  document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
  svg.innerHTML=''; panel.classList.remove('open'); states();
});
document.querySelectorAll('.tour-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tk=btn.dataset.tour;
    if(tour===tk){ reset(); return; }
    tour=tk; active=null; q=''; search.value='';
    document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    svg.innerHTML=''; panel.classList.remove('open'); states();
  });
});
canvas.addEventListener('scroll',()=>{ if(active) lines(active); });

buildRows(); states();
</script>
