<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#21262d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#484f58;
  --purple:#A78BFA;--blue:#60A5FA;--green:#34D399;--red:#F87171;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg);gap:12px;flex-shrink:0;z-index:100}
.logo{font-size:14px;font-weight:700;white-space:nowrap;letter-spacing:.01em}
.logo span{color:var(--purple)}
.logo small{font-size:11px;font-weight:400;color:var(--muted);margin-left:8px}
.search-wrap{flex:1;max-width:280px;margin:0 auto}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--purple)}
.search-wrap input::placeholder{color:var(--muted)}
.tours{display:flex;gap:6px}
.tour-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;padding:6px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tour-btn:hover{border-color:var(--muted);color:var(--text)}
.tour-btn.active{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:490;opacity:0;transition:opacity .25s;pointer-events:none}
.backdrop.visible{opacity:1;pointer-events:auto}
.canvas{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;padding:24px 28px 80px}
.canvas-inner{position:relative;min-height:100%}
.svg-overlay{position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible}
.row{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.row-meta{display:flex;flex-direction:column;gap:2px;width:160px;flex-shrink:0;padding-top:5px}
.row-label-wrap{display:flex;align-items:center;gap:6px}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.row-desc{font-size:10px;color:var(--muted);margin-left:13px}
.row-nodes{flex:1;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start}
.pill{position:relative;display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .2s,border-color .2s,box-shadow .2s,background .2s;user-select:none;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.pill:hover{border-color:var(--muted)}
.pill.active{border-color:var(--row-color);box-shadow:0 0 0 1px var(--row-color),0 0 10px color-mix(in srgb,var(--row-color) 30%,transparent);background:color-mix(in srgb,var(--row-color) 8%,var(--surface))}
.pill.dimmed{opacity:.1;pointer-events:none}
.pill.highlighted{opacity:1;border-color:var(--row-color)}
.pill .badge{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;color:#000;font-size:8px;font-weight:900;flex-shrink:0}
.panel{width:420px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.panel.open{transform:translateX(0)}
.panel-handle{display:none;height:28px;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.panel-handle::after{content:'';width:36px;height:4px;background:var(--muted2);border-radius:2px}
.panel-close{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.panel-close:hover{color:var(--text);border-color:var(--muted)}
.panel-inner{flex:1;overflow-y:auto;padding:22px}
.panel-inner::-webkit-scrollbar{width:4px}
.panel-inner::-webkit-scrollbar-track{background:transparent}
.panel-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.p-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:12px}
.p-badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.p-conn-title{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.p-group{margin-bottom:12px}
.p-group-label{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.p-group-label .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:10px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--text);cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--muted)}

/* RESIZE HANDLE */
.panel-resize{position:absolute;left:-5px;top:0;bottom:0;width:10px;cursor:col-resize;z-index:10}
.panel-resize::after{content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;background:transparent;transition:background .15s}
.panel-resize:hover::after,.panel-resize.dragging::after{background:var(--purple)}

/* PANEL TOOLBAR */
.panel-toolbar{display:flex;justify-content:flex-end;align-items:center;padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;gap:4px}
.ptb-btn{background:transparent;border:1px solid transparent;border-radius:5px;color:var(--muted);width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ptb-btn:hover{color:var(--text);border-color:var(--border);background:var(--surface2)}

/* PANEL FULLSCREEN */
.panel.expanded{position:absolute;inset:0;width:auto!important;z-index:200;border-left:none;border-radius:0}
.panel.expanded .panel-resize{display:none}

.stats{position:fixed;bottom:12px;left:20px;font-size:10px;color:var(--muted2);z-index:200;pointer-events:none;letter-spacing:.02em}
.canvas::-webkit-scrollbar{width:5px}
.canvas::-webkit-scrollbar-track{background:transparent}
.canvas::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ARTICLE BODY */
.article-body h1{font-size:22px;font-weight:700;margin:0 0 16px;color:var(--text)}
.article-body h2{font-size:16px;font-weight:700;margin:20px 0 8px;color:var(--text);padding-top:4px;border-top:1px solid var(--border)}
.article-body h3{font-size:14px;font-weight:600;margin:16px 0 6px;color:var(--text)}
.article-body p{font-size:13px;color:#8b949e;line-height:1.7;margin:0 0 10px}
.article-body ul,.article-body ol{padding-left:18px;margin:0 0 10px}
.article-body li{font-size:13px;color:#8b949e;line-height:1.6;margin-bottom:4px}
.article-body code{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:11px;font-family:'JetBrains Mono',monospace}
.article-body pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;margin:0 0 12px;overflow-x:auto}
.article-body pre code{background:none;border:none;padding:0;font-size:11px}
.article-body blockquote{border-left:3px solid var(--purple);padding:8px 12px;margin:0 0 10px;background:color-mix(in srgb,var(--purple) 6%,transparent);border-radius:0 4px 4px 0}
.article-body blockquote p{margin:0;color:var(--text);font-style:italic;font-size:13px}
.article-body hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.article-body strong{color:var(--text);font-weight:600}
.article-body table{width:100%;border-collapse:collapse;margin:0 0 12px;font-size:12px}
.article-body th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.article-body td{padding:6px 8px;border-bottom:1px solid var(--border);color:#8b949e}
.article-body a.wikilink{color:var(--blue);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;cursor:pointer;font-weight:500}
.article-body a.wikilink:hover{color:var(--text)}
.article-body a:not(.wikilink){color:var(--muted);font-size:12px}

/* NEXT NAV */
.next-nav{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.next-nav-label{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.next-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;text-decoration:none}
.next-chip:hover{border-color:var(--muted);background:var(--surface)}
.next-chip .arrow{font-size:14px}

/* TOUR PROGRESS */
.tour-progress{display:flex;align-items:center;gap:8px;padding:10px 14px;background:color-mix(in srgb,var(--purple) 6%,transparent);border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.tp-label{font-size:10px;font-weight:700;color:var(--purple);flex:1;white-space:nowrap}
.tp-dots{display:flex;gap:4px;align-items:center}
.tp-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:background .2s}
.tp-dot.done{background:var(--purple)}
.tp-dot.current{background:var(--purple);box-shadow:0 0 0 2px color-mix(in srgb,var(--purple) 30%,transparent)}
.tp-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;padding:3px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tp-btn:hover{color:var(--text);border-color:var(--muted)}
.tp-btn:disabled{opacity:.3;pointer-events:none}

/* MOBILE */
@media (max-width: 767px) {
  body{height:100dvh}
  header{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .logo{flex:0 0 100%;font-size:14px}
  .logo small{display:none}
  .search-wrap{flex:1;max-width:none;min-width:100px;margin:0}
  .tours{flex:0 0 auto;max-width:calc(100% - 130px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tours::-webkit-scrollbar{display:none}
  .pill{font-size:13px;padding:8px 14px}
  .row{flex-direction:column;gap:8px}
  .row-meta{width:100%;flex-direction:row;align-items:center;padding-top:0}
  .canvas{padding:16px 14px 140px}
  .backdrop{display:block}
  .panel{position:fixed;bottom:0;left:0;right:0;width:100%;height:70vh;max-height:80vh;border-left:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;transform:translateY(100%);z-index:500;box-shadow:0 -8px 40px rgba(0,0,0,.5)}
  .panel.open{transform:translateY(0)}
  .panel-handle{display:flex}
  .panel-close{display:flex}
  .panel-toolbar{display:none}
  .panel-resize{display:none}
  .stats{display:none}
}
</style>

> **One-line summary:** Climbo is the white-label AI platform you use to run a reputation management agency — your clients see your brand, you keep the margin.

## Overview

Climbo is a SaaS platform built for agency owners, not for local businesses directly. You pay €99/month flat. You rebrand the entire platform with your name, logo, and domain. You resell it to local businesses (restaurants, dentists, gyms, law firms, contractors) at whatever price you choose — typically $99–$500/month per client. Every client you add increases your profit; your cost stays fixed at €99.

The core promise to your clients: more Google reviews, higher ranking, more customers — all automated. They do not log in daily. They do not manage anything. The system runs in the background.

## How it works

Climbo runs what the founder Giacomo calls the **Review Marketing Flywheel**:

\`\`\`
Customer leaves a review
  → SEO Agent replies with keyword-rich text (Google Maps ranking improves)
  → Social Agent turns the review into a social post (GBP stays active)
  → GEO Agent publishes blog/web content (client appears on ChatGPT, Perplexity)
  → More visibility → more customers → more reviews
\`\`\`

2. Go to **Kiosk Mode** → print the page (or download as PDF)

Best for: low-volume professional services (lawyers, dentists, accountants, consultants)

## What you need

- An NFC card, tag, sticker, or countertop stand (purchased separately — not included in Climbo)
- A device to write (encode) the review URL to the NFC tag
- The client's unique review link from Climbo

You write the client's Climbo review link onto the NFC tag using a free app like **NFC Tools** (iOS/Android):

1. Get the client's review link from Climbo (\`Settings → Review Link\`)
2. Open NFC Tools on your phone
3. Select "Write" → "Add a Record" → "URL/URI"

CONTENT['operations/smtp-setup'] = `# SMTP Setup

> **One-line summary:** Connect your own email domain to Climbo so review request emails come from @yourdomain.com instead of a generic address.

## Overview

By default, Climbo sends review request emails using its own mail server. This works, but the "from" address will not be your brand — it will be a Climbo address.

SMTP (Simple Mail Transfer Protocol) lets you connect your own email account so that emails sent by Climbo appear to come from you. Example: instead of \`noreply@climbo.com\`, your clients' customers receive a message from \`reviews@youragency.com\` or \`hello@yourbusiness.it\`.

This feature was announced in the AMA of June 25 2026.

## Why it matters

- **Trust:** Emails from a recognized domain get opened more. Emails from an unknown generic address get ignored or marked as spam.
- **Deliverability:** Properly configured domains with SPF/DKIM records have lower spam rates than shared mail servers.
- **Professionalism:** If you're white-labeling Climbo under your agency brand, everything — including emails — should look like it comes from you.

## How to set it up

1. Go to your Climbo dashboard
2. Navigate to **Settings > Email > SMTP**
3. Enter your SMTP details:
   - **Host:** e.g. \`smtp.gmail.com\` or \`smtp-relay.brevo.com\`
   - **Port:** 587 (TLS) or 465 (SSL)
   - **Username:** your email address
   - **Password:** your SMTP password or app password
4. Send a test email to confirm it works

## Recommended SMTP providers

| Provider | Cost | Notes |
|----------|------|-------|
| Google Workspace | ~€6/month per user | Reliable, familiar, good deliverability |
| Brevo (formerly Sendinblue) | Free up to 300 emails/day | Good free tier for starting out |
| Zoho Mail | Free plan available | Budget option, lower limits |

For most agency owners starting out, **Brevo's free tier** covers review request volumes for the first several months.

## Key details / Tips

- If you use Gmail (personal), you need to generate an **App Password** in your Google account security settings — the regular password will not work
- Make sure your domain has SPF and DKIM records set correctly, or your emails may still end up in spam even with SMTP connected
- The SMTP setting applies to all review request emails across your Climbo account

Review gating means: showing unhappy customers a private feedback form, and only directing happy customers to Google. Many agencies and competitor tools have been doing this for years. As of April 2026, it is a TOS violation and can result in **GBP suspension**.

CONTENT['compliance/gdpr-eu'] = `# GDPR — EU Compliance for Review Requests

> **One-line summary:** Practical guidance for EU agency owners sending review requests — what you need to know, not legal advice.

## Overview

If you're operating in the EU, GDPR applies when you collect and use customer data (names, phone numbers, email addresses) to send review requests. This page covers the basics you need to stay safe in practice.

This is not legal advice. If you have specific concerns, consult a lawyer in your country.

## What GDPR means for your Climbo setup

When your clients give you a list of their past customers to upload into Climbo, those customers' data (name, email, phone) is being processed. As the agency running Climbo:

- **Your client is the data controller** — they collected that data from their customers
- **You are the data processor** — you're processing it on their behalf
- You should have a **Data Processing Agreement (DPA)** in place with each client (a short contract addendum)

## Lawful basis for sending review requests

The most practical lawful basis for a review request is **legitimate interest** or an **existing customer relationship** (in some EU countries, this is called the "soft opt-in" rule under ePrivacy).

In practice, this means:

- Only send review requests to people who have **had a real transaction** with the business — not cold contacts, not scraped lists
- The request must be **related to the transaction** (asking about their experience as a customer)
- The business name must be **clearly visible** in the message so the recipient knows who is contacting them

## Practical checklist

- [ ] Only import customers who have made a purchase or appointment
- [ ] Review request templates include the business name (Climbo's default templates do)
- [ ] You have a DPA with your clients
- [ ] Clients understand they are responsible for having had a legitimate relationship with their customers
- [ ] Do not purchase contact lists or send to unrelated contacts

## What about SMS?

SMS (text messages) for marketing is more tightly regulated in some EU countries than email. In some jurisdictions you need explicit opt-in consent for promotional SMS. Review requests generally qualify as transactional, not promotional, but this varies by country. When in doubt, start with email.

## Key details / Tips

- GDPR came up as one of the highest-engagement threads in the Skool community (28 comments, Jan 2026) — it is a real concern for EU agency owners
- Climbo's data is stored in their infrastructure; ask Climbo support directly for their DPA if you need one for your clients
- The "legitimate interest" basis is generally sufficient for post-transaction review requests to existing customers — you do not need prior opt-in consent in most EU countries for this specific use case

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────────
function md(src) {
  if (!src) return '';
  // strip YAML frontmatter (--- ... ---)
  src = src.replace(/^---[\s\S]*?---\s*/m, '');

  // protect code blocks first
  const codeBlocks = [];
  src = src.replace(/```[\s\S]*?```/g, m => {
    const lang = m.match(/^```(\w*)/)?.[1] || '';
    const code = m.replace(/^```\w*\n?/, '').replace(/\n?```$/, '');
    codeBlocks.push(`<pre><code>${esc(code)}</code></pre>`);
    return `\x02CODE${codeBlocks.length - 1}\x03`;
  });

  // inline code
  const inlineCodes = [];
  src = src.replace(/`([^`]+)`/g, (_, c) => {
    inlineCodes.push(`<code>${esc(c)}</code>`);
    return `\x02IC${inlineCodes.length - 1}\x03`;
  });

  const lines = src.split('\n');
  const out = [];
  let i = 0;
  let inUl = false, inOl = false, inBq = false;

  function closeList() {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  }
  function closeBq() {
    if (inBq) { out.push('</blockquote>'); inBq = false; }
  }

  while (i < lines.length) {
    let line = lines[i];

    // horizontal rule
    if (/^---+$/.test(line.trim())) {
      closeList(); closeBq();
      out.push('<hr>');
      i++; continue;
    }

    // headings
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) {
      closeList(); closeBq();
      const lvl = hm[1].length;
      out.push(`<h${lvl}>${inline(hm[2])}</h${lvl}>`);
      i++; continue;
    }

    // blockquote
    if (line.startsWith('> ')) {
      closeList();
      if (!inBq) { out.push('<blockquote>'); inBq = true; }
      out.push(`<p>${inline(line.slice(2))}</p>`);
      i++; continue;
    } else if (inBq && line.trim() === '') {
      closeBq();
    } else if (inBq) {
      closeBq();
    }

    // tables
    if (line.includes('|') && lines[i+1] && lines[i+1].includes('---')) {
      closeList();
      const headers = line.split('|').filter(c => c.trim()).map(c => `<th>${inline(c.trim())}</th>`).join('');
      out.push(`<table><thead><tr>${headers}</tr></thead><tbody>`);
      i += 2; // skip separator
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c => c.trim()).map(c => `<td>${inline(c.trim())}</td>`).join('');
        out.push(`<tr>${cells}</tr>`);
        i++;
      }
      out.push('</tbody></table>');
      continue;
    }

    // unordered list
    const ulm = line.match(/^[-*]\s+(.*)/);
    if (ulm) {
      closeBq();
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${inline(ulm[1])}</li>`);
      i++; continue;
    }

    // ordered list
    const olm = line.match(/^\d+\.\s+(.*)/);
    if (olm) {
      closeBq();
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${inline(olm[1])}</li>`);
      i++; continue;
    }

    // blank line
    if (line.trim() === '') {
      closeList(); closeBq();
      i++; continue;
    }

    // paragraph
    closeList(); closeBq();
    let para = line;
    while (i + 1 < lines.length && lines[i+1].trim() !== '' && !lines[i+1].match(/^[#>*\-\d|]/) && !lines[i+1].startsWith('\x02CODE')) {
      i++;
      para += ' ' + lines[i];
    }
    out.push(`<p>${inline(para)}</p>`);
    i++;
  }
  closeList(); closeBq();

  let html = out.join('\n');

  // restore code blocks
  codeBlocks.forEach((b, idx) => { html = html.replace(`\x02CODE${idx}\x03`, b); });
  inlineCodes.forEach((b, idx) => { html = html.replace(`\x02IC${idx}\x03`, b); });

  return html;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inline(s) {
  // [[wiki-link]]
  s = s.replace(/\[\[([^\]]+)\]\]/g, (_, id) => {
    const label = NM[id] ? NM[id].label : id.split('/').pop();
    return `<a class="wikilink" href="#${id}" data-id="${id}">${label}</a>`;
  });
  // [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // **bold**
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // *italic*
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return s;
}

// ── APP STATE ─────────────────────────────────────────────────────────────
let active = null, tour = null, q = '';

const canvas = document.getElementById('canvas');
const ci = document.getElementById('ci');
const svg = document.getElementById('svg');
const panel = document.getElementById('panel');
const pi = document.getElementById('pi');
const search = document.getElementById('search');
const backdrop = document.getElementById('backdrop');

function pill(id){ return document.getElementById('p-'+id.replace(/\//g,'-')) }

function center(el){
  const cr=ci.getBoundingClientRect(), er=el.getBoundingClientRect();
  return {x:er.left-cr.left+er.width/2, y:er.top-cr.top+er.height/2};
}

function buildRows(){
  ROWS.forEach(rk=>{
    const rc=RC[rk];
    const ns=NODES.filter(n=>n.row===rk);
    const row=document.createElement('div');
    row.className='row';
    row.innerHTML=`
      <div class="row-meta">
        <div class="row-label-wrap">
          <div class="row-dot" style="background:${rc.color}"></div>
          <span class="row-label" style="color:${rc.color}">${rc.label}</span>
        </div>
        <span class="row-desc">${rc.desc}</span>
      </div>
      <div class="row-nodes" id="rn-${rk}"></div>`;
    ci.appendChild(row);
    const cont=row.querySelector('.row-nodes');
    ns.forEach(n=>{
      const p=document.createElement('div');
      p.className='pill'; p.id='p-'+n.id.replace(/\//g,'-');
      p.dataset.id=n.id; p.dataset.row=n.row;
      p.style.setProperty('--row-color', rc.color);
      p.textContent=n.label;
      p.addEventListener('click',e=>{e.stopPropagation();select(n.id)});
      cont.appendChild(p);
    });
  });
}

function lines(id){
  svg.innerHTML='';
  svg.style.height=ci.scrollHeight+'px';
  const n=NM[id]; if(!n) return;
  const rc=RC[n.row];
  const se=pill(id); if(!se) return;
  const s=center(se);
  n.connected.forEach(cid=>{
    const te=pill(cid); if(!te) return;
    const t=center(te);
    const mx=(s.x+t.x)/2, my=(s.y+t.y)/2 - Math.abs(t.x-s.x)*0.18;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${s.x} ${s.y} Q${mx} ${my} ${t.x} ${t.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',rc.color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-opacity','0.55');
    svg.appendChild(path);
  });
}

function states(){
  const conn=active?new Set(NM[active]?.connected||[]):new Set();
  const tset=tour?new Set(TOURS[tour]):null;
  const tord=tour?TOURS[tour]:null;
  NODES.forEach(n=>{
    const el=pill(n.id); if(!el) return;
    el.classList.remove('active','dimmed','highlighted');
    const existing=el.querySelector('.badge');
    if(existing) existing.remove();
    el.textContent=n.label;
    const match=!q||n.label.toLowerCase().includes(q);
    if(q){ if(!match) el.classList.add('dimmed'); return; }
    if(tset){
      if(!tset.has(n.id)){ el.classList.add('dimmed'); }
      else{
        const idx=tord.indexOf(n.id)+1;
        const b=document.createElement('span');
        b.className='badge'; b.style.background=RC[n.row].color; b.textContent=idx;
        el.prepend(b);
      }
      return;
    }
    if(active){
      if(n.id===active) el.classList.add('active');
      else if(conn.has(n.id)) el.classList.add('highlighted');
      else el.classList.add('dimmed');
    }
  });
}

function showPanel(id){
  const n=NM[id]; if(!n) return;
  const rc=RC[n.row];

  // tour progress bar
  let tourHtml='';
  if(tour && TOURS[tour].includes(id)){
    const tNodes=TOURS[tour];
    const idx=tNodes.indexOf(id);
    const dots=tNodes.map((tid,i)=>{
      const cls=i<idx?'done':i===idx?'current':'';
      return `<span class="tp-dot ${cls}"></span>`;
    }).join('');
    const tourLabels={new:"I'm new here",clients:"I want clients",operational:"I'm operational"};
    const prevId=idx>0?tNodes[idx-1]:null;
    const nextId=idx<tNodes.length-1?tNodes[idx+1]:null;
    tourHtml=`<div class="tour-progress">
      <span class="tp-label">${tourLabels[tour]} — Step ${idx+1} of ${tNodes.length}</span>
      <div class="tp-dots">${dots}</div>
      <button class="tp-btn" ${!prevId?'disabled':''} onclick="select('${prevId||''}')">← Prev</button>
      <button class="tp-btn" ${!nextId?'disabled':''} onclick="select('${nextId||''}')">Next →</button>
    </div>`;
  }

  // full article content
  const content=CONTENT[id]||'';
  const bodyHtml=md(content);

  // next in DEFAULT_PATH
  const dpIdx=DEFAULT_PATH.indexOf(id);
  const nextDefault=dpIdx>=0&&dpIdx<DEFAULT_PATH.length-1?DEFAULT_PATH[dpIdx+1]:null;
  let nextNavHtml='';
  if(nextDefault&&NM[nextDefault]){
    const nn=NM[nextDefault];
    nextNavHtml=`<div class="next-nav">
      <div class="next-nav-label">Continue reading</div>
      <span class="next-chip" data-id="${nn.id}">
        <span class="arrow">→</span> ${nn.label}
      </span>
    </div>`;
  }

  // connected chips grouped by category
  const groups={};ROWS.forEach(r=>groups[r]=[]);
  n.connected.forEach(cid=>{const cn=NM[cid];if(cn)groups[cn.row].push(cn);});
  let chips='';
  ROWS.forEach(rk=>{
    if(!groups[rk].length) return;
    const crc=RC[rk];
    chips+=`<div class="p-group">
      <div class="p-group-label"><span class="dot" style="background:${crc.color}"></span><span style="color:${crc.color}">${crc.label}</span></div>
      <div class="chips">${groups[rk].map(cn=>`<span class="chip" data-id="${cn.id}">${cn.label}</span>`).join('')}</div>
    </div>`;
  });

  pi.innerHTML=`
    <div class="p-badge" style="background:color-mix(in srgb,${rc.color} 12%,transparent);color:${rc.color}">
      <span class="p-badge-dot" style="background:${rc.color}"></span>${rc.label}
    </div>
    ${tourHtml}
    <div class="article-body">${bodyHtml}</div>
    ${nextNavHtml}
    <hr class="p-divider">
    <div class="p-conn-title">Connected to</div>
    ${chips}`;

  // wire up events
  pi.querySelectorAll('.chip,.next-chip').forEach(c=>c.addEventListener('click',()=>select(c.dataset.id)));
  pi.querySelectorAll('a.wikilink').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();select(a.dataset.id);}));

  panel.classList.add('open');
  pi.scrollTop=0;
}

// ── PANEL EXPAND / RESIZE ─────────────────────────────────────────────────
const EXPAND_SVG=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 4.5V1h3.5M8.5 1H12v3.5M12 8.5V12H8.5M4.5 12H1V8.5"/></svg>`;
const COMPRESS_SVG=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4.5 1v3.5H1M12 4.5H8.5V1M8.5 12V8.5H12M1 8.5h3.5V12"/></svg>`;
let panelExpanded=false;
const expandBtn=document.getElementById('panel-expand');
expandBtn.innerHTML=EXPAND_SVG;

function toggleExpand(){
  panelExpanded=!panelExpanded;
  panel.classList.toggle('expanded',panelExpanded);
  expandBtn.innerHTML=panelExpanded?COMPRESS_SVG:EXPAND_SVG;
  expandBtn.title=panelExpanded?'Exit fullscreen (Esc)':'Fullscreen';
  if(active) setTimeout(()=>lines(active),30);
}
expandBtn.addEventListener('click',toggleExpand);

(function(){
  const handle=document.getElementById('panel-resize');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    if(window.innerWidth<768) return;
    e.preventDefault();
    dragging=true; startX=e.clientX; startW=panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const w=Math.max(320,Math.min(window.innerWidth*.85,startW+(startX-e.clientX)));
    panel.style.width=w+'px';
    if(active) lines(active);
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; handle.classList.remove('dragging');
    document.body.style.cursor=''; document.body.style.userSelect='';
  });
})();

function select(id){
  if(!id||!NM[id]) return;
  // keep tour active if node is part of the tour
  if(tour && !TOURS[tour].includes(id)){
    tour=null;
    document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
  }
  active=id;
  states();
  lines(id);
  showPanel(id);
  history.pushState(null,'','#'+id);
  if(window.innerWidth<768){
    const el=pill(id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }
  backdrop.classList.add('visible');
}

function reset(){
  active=null; tour=null; q=''; search.value='';
  document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
  states(); svg.innerHTML=''; panel.classList.remove('open');
  backdrop.classList.remove('visible');
  history.pushState(null,'','#');
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.getElementById('panel-close').addEventListener('click', reset);
backdrop.addEventListener('click', reset);
canvas.addEventListener('click',e=>{
  if(e.target===canvas||e.target===ci||e.target===svg) reset();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(panelExpanded){ toggleExpand(); return; }
    reset();
  }
});
search.addEventListener('input',()=>{
  q=search.value.trim().toLowerCase();
  active=null; tour=null;
  document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
  svg.innerHTML=''; panel.classList.remove('open'); states();
});
document.querySelectorAll('.tour-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tk=btn.dataset.tour;
    if(tour===tk){ reset(); return; }
    tour=tk; active=null; q=''; search.value='';
    document.querySelectorAll('.tour-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    svg.innerHTML=''; panel.classList.remove('open'); states();
    // open first node of tour
    select(TOURS[tk][0]);
  });
});
canvas.addEventListener('scroll',()=>{ if(active) lines(active); });
window.addEventListener('popstate',()=>{
  const id=location.hash.slice(1);
  if(id && NM[id]) { active=id; states(); lines(id); showPanel(id); backdrop.classList.add('visible'); }
  else reset();
});

// ── INIT ──────────────────────────────────────────────────────────────────
buildRows(); states();
// hash routing on load
(()=>{
  const id=location.hash.slice(1);
  if(id && NM[id]) select(id);
})();
</script>
