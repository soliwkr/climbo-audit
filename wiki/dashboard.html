<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climbo Knowledge Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #7d8590;
    --purple: #A78BFA;
    --blue: #60A5FA;
    --green: #34D399;
    --red: #F87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-title span {
    color: var(--purple);
  }

  .header-search {
    flex: 1;
    max-width: 320px;
    margin: 0 auto;
  }

  .header-search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .header-search input:focus {
    border-color: var(--purple);
  }

  .header-search input::placeholder { color: var(--muted); }

  .tour-buttons {
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }

  .tour-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tour-btn:hover { border-color: var(--purple); color: var(--text); }
  .tour-btn.active { border-color: var(--purple); color: var(--purple); background: rgba(167,139,250,0.08); }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* CANVAS */
  .canvas {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    padding: 28px 32px 80px;
  }

  .canvas-inner {
    position: relative;
    min-height: 100%;
  }

  /* SVG OVERLAY */
  .svg-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ROWS */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    position: relative;
  }

  .row-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    width: 180px;
    flex-shrink: 0;
    padding-top: 6px;
  }

  .row-label-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .row-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .row-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .row-desc {
    font-size: 11px;
    color: var(--muted);
    margin-left: 16px;
  }

  .row-nodes {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }

  /* PILLS */
  .pill {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    user-select: none;
    white-space: nowrap;
  }

  .pill:hover {
    border-color: var(--muted);
  }

  .pill.active {
    border-color: var(--row-color);
    box-shadow: 0 0 0 1px var(--row-color), 0 0 12px rgba(var(--row-color-rgb), 0.3);
    background: rgba(var(--row-color-rgb), 0.08);
  }

  .pill.dimmed {
    opacity: 0.12;
  }

  .pill.highlighted {
    opacity: 1;
    border-color: var(--row-color);
  }

  .pill .tour-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--row-color);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    flex-shrink: 0;
  }

  /* PANEL */
  .panel {
    width: 380px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .panel.open {
    transform: translateX(0);
  }

  .panel-inner {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .panel-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 14px;
  }

  .panel-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    color: var(--text);
  }

  .panel-summary {
    font-size: 13px;
    line-height: 1.6;
    color: #8b949e;
    margin-bottom: 24px;
  }

  .panel-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .connected-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .connected-group {
    margin-bottom: 16px;
  }

  .connected-group-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .connected-group-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .connected-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .chip:hover {
    border-color: var(--muted);
  }

  /* STATS BAR */
  .stats-bar {
    position: fixed;
    bottom: 16px;
    left: 24px;
    font-size: 11px;
    color: var(--muted);
    z-index: 200;
    pointer-events: none;
  }

  /* SCROLLBAR */
  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-track { background: transparent; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel-inner::-webkit-scrollbar { width: 4px; }
  .panel-inner::-webkit-scrollbar-track { background: transparent; }
  .panel-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-title"><span>Climbo</span> Knowledge Map</div>
  <div class="header-search">
    <input type="text" id="search" placeholder="Search nodes…" autocomplete="off">
  </div>
  <div class="tour-buttons">
    <button class="tour-btn" data-tour="new">I'm new here</button>
    <button class="tour-btn" data-tour="clients">I want clients</button>
    <button class="tour-btn" data-tour="operational">I'm operational</button>
  </div>
</header>

<div class="layout">
  <div class="canvas" id="canvas">
    <div class="canvas-inner" id="canvasInner">
      <svg class="svg-overlay" id="svgOverlay"></svg>
      <!-- rows injected by JS -->
    </div>
  </div>
  <div class="panel" id="panel">
    <div class="panel-inner" id="panelInner"></div>
  </div>
</div>

<div class="stats-bar">28 nodes · 77 connections · built from 30 video transcripts + 933 Skool posts · Esc to reset</div>

<script>
const ROW_CONFIG = {
  foundations: { label: 'FOUNDATIONS', desc: 'understand this first', color: '#A78BFA', rgb: '167,139,250' },

const ROW_ORDER = ['foundations', 'platform', 'playbook', 'reference'];

const TOURS = {

  clients: ['sales/finding-clients','sales/demo-script','sales/objections','getting-started/first-client-checklist','operations/onboarding-clients'],
  operational: ['operations/onboarding-clients','operations/retention','operations/smtp-setup','compliance/google-review-policy-2026','ai-agents/geo-agent'],
};

const NODES = [
  {"id":"overview","label":"Climbo Overview","row":"foundations","summary":"Climbo is a white-label AI reputation management platform. Agency owners resell it to local businesses to generate reviews, rank higher on Google, and appear in AI search.","connected":["getting-started/what-is-climbo","getting-started/pricing-and-plans","ai-agents/overview","features/review-requests","features/white-label"]},
  {"id":"getting-started/what-is-climbo","label":"What Is Climbo?","row":"foundations","summary":"Understand the business model before touching anything. Agency owner pays €99/month, resells to local businesses. Three AI agents run automatically.","connected":["overview","getting-started/pricing-and-plans","getting-started/account-setup","ai-agents/overview","features/review-requests","features/white-label"]},
  {"id":"getting-started/pricing-and-plans","label":"Pricing & Plans","row":"foundations","summary":"€99/month for agency. You set your own prices for clients. Create unlimited client plans. Stripe handles billing automatically.","connected":["getting-started/what-is-climbo","features/stripe-billing","getting-started/account-setup","features/white-label","operations/onboarding-clients"]},
  {"id":"getting-started/account-setup","label":"Account Setup","row":"foundations","summary":"30-minute setup: white-label brand, custom domain, connect Stripe, top up balance. Do this before your first client.","connected":["getting-started/pricing-and-plans","features/white-label","features/balance-explained","features/stripe-billing","operations/smtp-setup"]},
  {"id":"ai-agents/overview","label":"AI Agents Overview","row":"foundations","summary":"Three agents run automatically: SEO Agent replies to reviews, Social Agent posts them to GBP, GEO Agent publishes content for AI search.","connected":["ai-agents/seo-agent","ai-agents/social-agent","ai-agents/geo-agent","features/review-requests","overview"]},
  {"id":"features/review-requests","label":"Review Requests","row":"platform","summary":"Send SMS/email to past customers → they tap a link → leave a Google review. The core engine of the whole system.","connected":["features/nfc-cards","features/gbp-integration","ai-agents/seo-agent","features/google-sheets","getting-started/first-client-checklist","compliance/google-review-policy-2026"]},
  {"id":"features/nfc-cards","label":"NFC Cards","row":"platform","summary":"Physical card: customer taps with phone → review page opens in 2 seconds. The wow moment in your demo.","connected":["features/review-requests","sales/demo-script","getting-started/first-client-checklist"]},
  {"id":"features/gbp-integration","label":"Google Business Profile","row":"platform","summary":"Connect client's GBP (Google Business Profile) to unlock review monitoring, social posts, and ranking data.","connected":["features/review-requests","ai-agents/social-agent","ai-agents/seo-agent","ai-agents/geo-agent","compliance/google-review-policy-2026"]},
  {"id":"features/white-label","label":"White-Label","row":"platform","summary":"Full rebrand of Climbo under your brand. Custom domain (os.yourdomain.com), your logo, your AI name. Clients never see Climbo.","connected":["getting-started/account-setup","features/mobile-app","features/client-portal","getting-started/pricing-and-plans"]},
  {"id":"features/client-portal","label":"Client Portal","row":"platform","summary":"What clients see: their reviews, stats, campaign history. Branded with your logo. Read-only for clients.","connected":["features/white-label","operations/onboarding-clients","operations/retention"]},
  {"id":"ai-agents/seo-agent","label":"SEO Agent","row":"platform","summary":"Automatically writes keyword-rich replies to every Google review. 'Best dentist in [city]' phrasing helps Maps ranking.","connected":["ai-agents/overview","features/gbp-integration","features/review-requests","ai-agents/social-agent","compliance/google-review-policy-2026"]},
  {"id":"ai-agents/social-agent","label":"Social Agent","row":"platform","summary":"Turns every review into a Google Business Profile post automatically. More GBP activity = higher Google Maps ranking.","connected":["ai-agents/overview","ai-agents/seo-agent","features/gbp-integration","ai-agents/geo-agent"]},
  {"id":"ai-agents/geo-agent","label":"GEO Agent","row":"platform","summary":"Publishes review content as a website/blog. When someone asks ChatGPT or Perplexity 'best plumber in X', your client's name appears. Released April 17, 2026.","connected":["ai-agents/overview","ai-agents/social-agent","features/gbp-integration","ama/README"]},
  {"id":"features/stripe-billing","label":"Stripe Billing","row":"platform","summary":"Connect Stripe to charge clients automatically. Set up recurring subscriptions per client. Coupon codes for founders/free trials.","connected":["getting-started/pricing-and-plans","getting-started/account-setup","operations/onboarding-clients","getting-started/first-client-checklist"]},
  {"id":"features/mobile-app","label":"Mobile App","row":"platform","summary":"Branded iOS + Android app for your clients under your brand. They see their reviews and stats on mobile.","connected":["features/white-label","features/client-portal"]},
  {"id":"features/balance-explained","label":"Balance","row":"platform","summary":"Pre-paid credits used for SMS, WhatsApp, and AI token costs. Recharge from dashboard. Minimum $20. Shared across all clients.","connected":["getting-started/account-setup","features/review-requests","operations/onboarding-clients"]},
  {"id":"features/google-sheets","label":"Google Sheets","row":"platform","summary":"Import customer lists from Google Sheets directly. Connect sheet → map columns → send bulk review requests. No CSV needed.","connected":["features/review-requests","operations/onboarding-clients"]},
  {"id":"sales/finding-clients","label":"Finding Clients","row":"playbook","summary":"Target local businesses with <50 Google reviews and a competitor beating them. Google Maps search + cold visits + Facebook local groups.","connected":["sales/demo-script","sales/objections","getting-started/first-client-checklist","case-studies/community-wins"]},
  {"id":"sales/demo-script","label":"Demo Script","row":"playbook","summary":"10-minute pitch to a local business. Show the competitor gap, demo the NFC card, offer 5 free reviews. You pitch results, not software.","connected":["sales/finding-clients","sales/objections","features/nfc-cards","operations/onboarding-clients","getting-started/first-client-checklist"]},
  {"id":"sales/objections","label":"Objections","row":"playbook","summary":"'I'll think about it' / 'I already have reviews' / 'Too expensive'. Scripts for each. Free trial overcomes most objections.","connected":["sales/demo-script","sales/finding-clients","compliance/google-review-policy-2026"]},
  {"id":"getting-started/first-client-checklist","label":"First Client Checklist","row":"playbook","summary":"Step-by-step from prospect says yes to first reviews live. Includes what access to ask for, what to set up, and how to deliver the first wow.","connected":["sales/demo-script","features/nfc-cards","features/stripe-billing","operations/onboarding-clients","features/review-requests"]},
  {"id":"operations/onboarding-clients","label":"Onboarding Clients","row":"playbook","summary":"8-step setup: create client → connect GBP → customize template → configure agents → import list → first batch → show dashboard → 10+ reviews goal. 30 minutes.","connected":["getting-started/first-client-checklist","features/review-requests","features/google-sheets","operations/retention","features/client-portal","features/balance-explained"]},
  {"id":"operations/retention","label":"Client Retention","row":"playbook","summary":"Monthly report + wow moment screenshot delivery. Upsell path: review requests → Social Agent → GEO Agent → Mobile App → NFC cards.","connected":["operations/onboarding-clients","features/client-portal","ai-agents/geo-agent","features/mobile-app","case-studies/community-wins"]},
  {"id":"operations/smtp-setup","label":"SMTP Setup","row":"playbook","summary":"Send review request emails from @yourdomain.com instead of Climbo's server. More trustworthy. Use Google Workspace or Brevo (free tier).","connected":["getting-started/account-setup","features/review-requests"]},
  {"id":"compliance/google-review-policy-2026","label":"Google Policy 2026","row":"reference","summary":"Google banned review gating in April 2026. Climbo is compliant by design — sends ALL customers to Google. Use this as a sales differentiator.","connected":["features/review-requests","ai-agents/seo-agent","compliance/gdpr-eu","sales/objections"]},
  {"id":"compliance/gdpr-eu","label":"GDPR (EU)","row":"reference","summary":"Practical guide for EU operators. Use existing customer relationships as lawful basis. Only send requests to past customers, not cold contacts.","connected":["compliance/google-review-policy-2026","features/review-requests","operations/onboarding-clients"]},
  {"id":"case-studies/community-wins","label":"Community Wins","row":"reference","summary":"8 real stories from the Skool community: 4 clients from 1 Facebook post, €3,000 in one week, #1 on ChatGPT day one. Read when you need motivation.","connected":["sales/finding-clients","operations/retention","ai-agents/geo-agent","ama/README"]},
  {"id":"ama/README","label":"AMA Archive","row":"reference","summary":"Table of all 31 YouTube AMAs with dates and key announcements. Check here when you heard about a feature and want to find the source video.","connected":["ai-agents/geo-agent","case-studies/community-wins","overview"]}
];

// Build lookup
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

// State
let activeNodeId = null;
let activeTour = null;
let searchQuery = '';

// DOM refs
const canvas = document.getElementById('canvas');
const canvasInner = document.getElementById('canvasInner');
const svgOverlay = document.getElementById('svgOverlay');
const panel = document.getElementById('panel');
const panelInner = document.getElementById('panelInner');
const searchInput = document.getElementById('search');

// Build rows
function buildRows() {
  ROW_ORDER.forEach(rowKey => {
    const rc = ROW_CONFIG[rowKey];
    const nodes = NODES.filter(n => n.row === rowKey);

    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    rowEl.dataset.row = rowKey;

    rowEl.innerHTML = `
      <div class="row-meta">
        <div class="row-label-wrap">
          <div class="row-dot" style="background:${rc.color}"></div>
          <span class="row-label" style="color:${rc.color}">${rc.label}</span>
        </div>
        <span class="row-desc">${rc.desc}</span>
      </div>
      <div class="row-nodes" id="row-nodes-${rowKey}"></div>
    `;

    canvasInner.appendChild(rowEl);

    const nodesContainer = rowEl.querySelector('.row-nodes');
    nodes.forEach(node => {
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.id = 'pill-' + CSS.escape(node.id);
      pill.dataset.id = node.id;
      pill.dataset.row = node.row;
      pill.style.setProperty('--row-color', rc.color);
      pill.style.setProperty('--row-color-rgb', rc.rgb);
      pill.textContent = node.label;
      pill.addEventListener('click', e => {
        e.stopPropagation();
        selectNode(node.id);
      });
      nodesContainer.appendChild(pill);
    });
  });
}

function getPillEl(id) {
  return document.getElementById('pill-' + CSS.escape(id));
}

function getCenter(el) {
  const canvasRect = canvasInner.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  return {
    x: elRect.left - canvasRect.left + elRect.width / 2,
    y: elRect.top - canvasRect.top + elRect.height / 2,
  };
}

function drawLines(nodeId) {
  // Clear svg
  svgOverlay.innerHTML = '';
  svgOverlay.style.height = canvasInner.scrollHeight + 'px';

  const node = nodeMap[nodeId];
  if (!node) return;
  const rc = ROW_CONFIG[node.row];
  const sourceEl = getPillEl(nodeId);
  if (!sourceEl) return;

  const src = getCenter(sourceEl);

  node.connected.forEach(connId => {
    const targetEl = getPillEl(connId);
    if (!targetEl) return;
    const tgt = getCenter(targetEl);

    // Quadratic bezier control point
    const mx = (src.x + tgt.x) / 2;
    const my = (src.y + tgt.y) / 2 - Math.abs(tgt.x - src.x) * 0.2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${src.x} ${src.y} Q ${mx} ${my} ${tgt.x} ${tgt.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', rc.color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.6');
    svgOverlay.appendChild(path);
  });
}

function selectNode(id) {
  if (activeTour) {
    // In tour mode, clicking a tour node is fine; exit tour selection
    activeTour = null;
    document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  }

  activeNodeId = id;
  updatePillStates();
  drawLines(id);
  showPanel(id);
}

function updatePillStates() {
  const connected = activeNodeId ? new Set(nodeMap[activeNodeId]?.connected || []) : new Set();
  const tourSet = activeTour ? new Set(TOURS[activeTour]) : null;
  const tourOrder = activeTour ? TOURS[activeTour] : null;

  NODES.forEach(node => {
    const el = getPillEl(node.id);
    if (!el) return;

    // Apply search filter first
    const matchesSearch = !searchQuery || node.label.toLowerCase().includes(searchQuery) || node.summary.toLowerCase().includes(searchQuery);

    el.classList.remove('active', 'dimmed', 'highlighted');

    // Remove existing badge
    const existingBadge = el.querySelector('.tour-badge');
    if (existingBadge) existingBadge.remove();
    // Reset text
    el.textContent = node.label;

    if (searchQuery) {
      if (!matchesSearch) {
        el.classList.add('dimmed');
      }
      return;
    }

    if (tourSet) {
      if (!tourSet.has(node.id)) {
        el.classList.add('dimmed');
      } else {
        const idx = tourOrder.indexOf(node.id) + 1;
        const badge = document.createElement('span');
        badge.className = 'tour-badge';
        badge.textContent = idx;
        const rc = ROW_CONFIG[node.row];
        badge.style.background = rc.color;
        el.prepend(badge);
      }
      return;
    }

    if (activeNodeId) {
      if (node.id === activeNodeId) {
        el.classList.add('active');
      } else if (connected.has(node.id)) {
        el.classList.add('highlighted');
      } else {
        el.classList.add('dimmed');
      }
    }
  });
}

function showPanel(id) {
  const node = nodeMap[id];
  if (!node) return;
  const rc = ROW_CONFIG[node.row];

  // Group connected by row
  const groups = {};
  ROW_ORDER.forEach(r => groups[r] = []);
  node.connected.forEach(cid => {
    const cn = nodeMap[cid];
    if (cn) groups[cn.row].push(cn);
  });

  let chipsHtml = '';
  ROW_ORDER.forEach(rowKey => {
    if (!groups[rowKey].length) return;
    const crc = ROW_CONFIG[rowKey];
    const chips = groups[rowKey].map(cn =>
      `<span class="chip" data-id="${cn.id}">${cn.label}</span>`
    ).join('');
    chipsHtml += `
      <div class="connected-group">
        <div class="connected-group-label">
          <span class="dot" style="background:${crc.color}"></span>
          <span style="color:${crc.color}">${crc.label}</span>
        </div>
        <div class="connected-chips">${chips}</div>
      </div>
    `;
  });

  panelInner.innerHTML = `
    <div class="panel-badge" style="background:rgba(${rc.rgb},0.12);color:${rc.color}">
      <span style="width:6px;height:6px;border-radius:50%;background:${rc.color};display:inline-block"></span>
      ${rc.label}
    </div>
    <div class="panel-title">${node.label}</div>
    <div class="panel-summary">${node.summary}</div>
    <hr class="panel-divider">
    <div class="connected-title">Connected to</div>
    ${chipsHtml}
  `;

  // Chip click handlers
  panelInner.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => selectNode(chip.dataset.id));
  });

  panel.classList.add('open');
}

function reset() {
  activeNodeId = null;
  activeTour = null;
  searchQuery = '';
  searchInput.value = '';
  document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  updatePillStates();
  svgOverlay.innerHTML = '';
  panel.classList.remove('open');
}

// Canvas click → reset
canvas.addEventListener('click', e => {
  if (e.target === canvas || e.target === canvasInner || e.target === svgOverlay) {
    reset();
  }
});

// ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') reset();
});

// Search
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  activeNodeId = null;
  activeTour = null;
  document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
  svgOverlay.innerHTML = '';
  panel.classList.remove('open');
  updatePillStates();
});

// Tour buttons
document.querySelectorAll('.tour-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tourKey = btn.dataset.tour;
    if (activeTour === tourKey) {
      reset();
      return;
    }
    activeTour = tourKey;
    activeNodeId = null;
    searchQuery = '';
    searchInput.value = '';
    document.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    svgOverlay.innerHTML = '';
    panel.classList.remove('open');
    updatePillStates();
  });
});

// Redraw lines on scroll (positions change)
canvas.addEventListener('scroll', () => {
  if (activeNodeId) drawLines(activeNodeId);
});

// Init
buildRows();
updatePillStates();
</script>
</body>
</html>
